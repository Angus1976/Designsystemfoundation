<svg width="360" height="72" viewBox="0 0 360 72" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="topH" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#40A9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1890FF;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="leftH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0B2847;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1677D9;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="rightH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1677D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#597EF7;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadowH">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Logo Icon -->
  <g transform="translate(8, 16)" filter="url(#shadowH)">
    
    <!-- W - Bar 1 -->
    <g>
      <path d="M 6 16 L 11 14 L 11 22 L 6 24 Z" fill="url(#topH)"/>
      <path d="M 6 16 L 6 24 L 9 28 L 9 20 Z" fill="url(#leftH)"/>
      <path d="M 11 14 L 11 22 L 14 26 L 14 18 Z" fill="url(#rightH)"/>
    </g>
    
    <!-- W - Bar 2 -->
    <g>
      <path d="M 16 24 L 21 22 L 21 26 L 16 28 Z" fill="url(#topH)"/>
      <path d="M 16 24 L 16 28 L 19 30 L 19 26 Z" fill="url(#leftH)"/>
      <path d="M 21 22 L 21 26 L 24 28 L 24 24 Z" fill="url(#rightH)"/>
    </g>
    
    <!-- W - Bar 3 -->
    <g>
      <path d="M 26 18 L 31 16 L 31 24 L 26 26 Z" fill="url(#topH)"/>
      <path d="M 26 18 L 26 26 L 29 30 L 29 22 Z" fill="url(#leftH)"/>
      <path d="M 31 16 L 31 24 L 34 28 L 34 20 Z" fill="url(#rightH)"/>
    </g>
    
    <!-- i - Bar 4 -->
    <g>
      <path d="M 42 8 L 47 6 L 47 32 L 42 34 Z" fill="url(#topH)"/>
      <path d="M 42 8 L 42 34 L 45 36 L 45 10 Z" fill="url(#leftH)"/>
      <path d="M 47 6 L 47 32 L 50 34 L 50 8 Z" fill="url(#rightH)"/>
    </g>
    
    <!-- Red Dot -->
    <circle cx="44.5" cy="2" r="4" fill="#FF4D4F"/>
    
    <!-- Arrow -->
    <path d="M 42 0 L 46 -4 L 50 0" 
          stroke="#52C41A" 
          stroke-width="2.5" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>

  <!-- Brand Text -->
  <g>
    <text x="75" y="30" 
          font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" 
          font-size="22" 
          font-weight="700" 
          fill="#0B2847"
          letter-spacing="1.5">
      问视间
    </text>

    <text x="75" y="50" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="14" 
          font-weight="700" 
          fill="#1890FF"
          letter-spacing="2.5">
      WINSAI
    </text>

    <line x1="145" y1="40" x2="145" y2="50" stroke="currentColor" stroke-width="1" opacity="0.15"/>

    <text x="155" y="50" 
          font-family="PingFang SC, Microsoft YaHei, sans-serif" 
          font-size="11" 
          fill="#5A5A5A" 
          opacity="0.75"
          letter-spacing="0.5">
      数据友好 · 智赢未来
    </text>
  </g>
</svg>
