<svg width="360" height="72" viewBox="0 0 360 72" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradH" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2E5FE8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#722ED1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#722ED1;stop-opacity:0.06" />
    </linearGradient>
    <filter id="glowH">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Logo Icon -->
  <g transform="translate(8, 12)">
    <circle cx="28" cy="24" r="26" fill="url(#bgH)" opacity="0.4"/>
    
    <!-- W: 3 strokes -->
    <path d="M 12 14 L 16 32" 
          stroke="url(#gradH)" 
          stroke-width="6" 
          stroke-linecap="round"
          fill="none"
          filter="url(#glowH)"/>
    
    <path d="M 16 32 L 22 20 L 28 32" 
          stroke="url(#gradH)" 
          stroke-width="6" 
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"
          filter="url(#glowH)"/>
    
    <path d="M 28 32 L 34 14" 
          stroke="url(#gradH)" 
          stroke-width="6" 
          stroke-linecap="round"
          fill="none"
          filter="url(#glowH)"/>
    
    <!-- i: vertical -->
    <path d="M 44 12 L 44 38" 
          stroke="url(#gradH)" 
          stroke-width="6" 
          stroke-linecap="round"
          fill="none"
          filter="url(#glowH)"/>
    
    <circle cx="44" cy="6" r="3.5" fill="#FF4D4F" filter="url(#glowH)"/>
    
    <!-- Data points -->
    <circle cx="14" cy="23" r="1.5" fill="#52C41A" opacity="0.7"/>
    <circle cx="19" cy="26" r="1.5" fill="#52C41A" opacity="0.7"/>
    <circle cx="25" cy="26" r="1.5" fill="#52C41A" opacity="0.7"/>
    <circle cx="31" cy="23" r="1.5" fill="#52C41A" opacity="0.7"/>
    <circle cx="44" cy="25" r="1.5" fill="#52C41A" opacity="0.7"/>
    
    <!-- Arrow -->
    <path d="M 42 4 L 45.5 0.5 L 49 4" 
          stroke="#52C41A" 
          stroke-width="2.5" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>

  <!-- Brand Text -->
  <g>
    <text x="75" y="30" 
          font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" 
          font-size="22" 
          font-weight="700" 
          fill="currentColor"
          letter-spacing="1.5">
      问视间
    </text>

    <text x="75" y="50" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="14" 
          font-weight="700" 
          fill="#1890FF"
          letter-spacing="2.5">
      WINSAI
    </text>

    <line x1="145" y1="40" x2="145" y2="50" stroke="currentColor" stroke-width="1" opacity="0.15"/>

    <text x="155" y="50" 
          font-family="PingFang SC, Microsoft YaHei, sans-serif" 
          font-size="11" 
          fill="currentColor" 
          opacity="0.65"
          letter-spacing="0.5">
      数据友好 · 智赢未来
    </text>
  </g>
</svg>
