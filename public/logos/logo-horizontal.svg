<svg width="360" height="72" viewBox="0 0 360 72" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wHoriz" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgHoriz" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Logo Icon Section -->
  <g transform="translate(8, 12)">
    <!-- Background -->
    <circle cx="28" cy="24" r="26" fill="url(#bgHoriz)"/>

    <!-- W Shape Bars -->
    <rect x="8" y="32" width="7" height="16" rx="2" fill="url(#wHoriz)"/>
    <rect x="17" y="24" width="7" height="24" rx="2" fill="url(#wHoriz)"/>
    <rect x="26" y="20" width="7" height="28" rx="2" fill="url(#wHoriz)"/>
    <rect x="35" y="16" width="7" height="32" rx="2" fill="url(#wHoriz)"/>
    <rect x="44" y="12" width="7" height="36" rx="2" fill="url(#wHoriz)"/>
    
    <!-- Arrow -->
    <path d="M 46 8 L 50 4 L 54 8" 
          stroke="#52C41A" 
          stroke-width="2.5" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    
    <!-- Data Points -->
    <circle cx="11.5" cy="30" r="2.5" fill="#FFFFFF"/>
    <circle cx="20.5" cy="22" r="2.5" fill="#FFFFFF"/>
    <circle cx="29.5" cy="18" r="2.5" fill="#FFFFFF"/>
    <circle cx="38.5" cy="14" r="2.5" fill="#FFFFFF"/>
    <circle cx="47.5" cy="10" r="2.5" fill="#FFFFFF"/>
    
    <!-- Trend Line -->
    <path d="M 11.5 30 L 20.5 22 L 29.5 18 L 38.5 14 L 47.5 10" 
          stroke="#FFFFFF" 
          stroke-width="2" 
          fill="none" 
          opacity="0.5"
          stroke-linecap="round"/>
  </g>

  <!-- Brand Text Section -->
  <g>
    <!-- Chinese Name: 问视间 -->
    <text x="80" y="32" 
          font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" 
          font-size="24" 
          font-weight="700" 
          fill="currentColor"
          letter-spacing="1">
      问视间
    </text>

    <!-- English Name: WINS -->
    <text x="80" y="54" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="16" 
          font-weight="700" 
          fill="#1890FF"
          letter-spacing="3">
      WINS
    </text>

    <!-- Divider -->
    <line x1="145" y1="44" x2="145" y2="54" stroke="currentColor" stroke-width="1" opacity="0.2"/>

    <!-- Tagline -->
    <text x="155" y="54" 
          font-family="PingFang SC, Microsoft YaHei, sans-serif" 
          font-size="12" 
          fill="currentColor" 
          opacity="0.65"
          letter-spacing="0.5">
      数据上升，智见成功
    </text>
  </g>
</svg>
