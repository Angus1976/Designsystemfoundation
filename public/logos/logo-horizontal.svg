<svg width="360" height="72" viewBox="0 0 360 72" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wHoriz" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgHoriz" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:0.06" />
    </linearGradient>
  </defs>

  <!-- Logo Icon Section -->
  <g transform="translate(6, 10)">
    <!-- Background -->
    <circle cx="30" cy="26" r="28" fill="url(#bgHoriz)"/>

    <!-- "Wi" Shape -->
    <!-- W: 4 Tilted Bars -->
    <g transform="rotate(-8 12 32)">
      <rect x="9" y="22" width="7" height="22" rx="2" fill="url(#wHoriz)"/>
    </g>
    
    <g transform="rotate(12 18 36)">
      <rect x="16" y="30" width="7" height="16" rx="2" fill="url(#wHoriz)"/>
    </g>
    
    <g transform="rotate(-10 27 30)">
      <rect x="25" y="20" width="7" height="22" rx="2" fill="url(#wHoriz)"/>
    </g>
    
    <g transform="rotate(8 36 26)">
      <rect x="34" y="16" width="7" height="26" rx="2" fill="url(#wHoriz)"/>
    </g>
    
    <!-- i: Straight bar -->
    <rect x="45" y="10" width="7" height="32" rx="2" fill="url(#wHoriz)"/>
    
    <!-- Red Dot -->
    <circle cx="48.5" cy="6" r="3" fill="#FF4D4F"/>
    
    <!-- Wave Line -->
    <path d="M 12 32 Q 18 38 24 34 T 36 26 Q 42 22 48.5 10" 
          stroke="#FFFFFF" 
          stroke-width="1.8" 
          fill="none" 
          opacity="0.6"
          stroke-linecap="round"/>
    
    <!-- Data Points -->
    <circle cx="12" cy="32" r="2" fill="#FFFFFF"/>
    <circle cx="24" cy="36" r="2" fill="#FFFFFF"/>
    <circle cx="28" cy="30" r="2" fill="#FFFFFF"/>
    <circle cx="36" cy="26" r="2" fill="#FFFFFF"/>
    <circle cx="48.5" cy="18" r="2" fill="#FFFFFF"/>
    
    <!-- Arrow -->
    <path d="M 46 6 L 50 2 L 54 6" 
          stroke="#52C41A" 
          stroke-width="2.5" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>

  <!-- Brand Text Section -->
  <g>
    <!-- Chinese Name -->
    <text x="80" y="32" 
          font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" 
          font-size="24" 
          font-weight="700" 
          fill="currentColor"
          letter-spacing="1">
      问视间
    </text>

    <!-- English Name -->
    <text x="80" y="54" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="16" 
          font-weight="700" 
          fill="#1890FF"
          letter-spacing="3">
      WINS
    </text>

    <!-- Divider -->
    <line x1="145" y1="44" x2="145" y2="54" stroke="currentColor" stroke-width="1" opacity="0.2"/>

    <!-- Tagline -->
    <text x="155" y="54" 
          font-family="PingFang SC, Microsoft YaHei, sans-serif" 
          font-size="12" 
          fill="currentColor" 
          opacity="0.65"
          letter-spacing="0.5">
      数据向好，智赢未来
    </text>
  </g>
</svg>
