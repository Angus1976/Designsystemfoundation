<svg width="280" height="80" viewBox="0 0 280 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:0.08" />
    </linearGradient>
  </defs>

  <!-- Logo Icon: W Shape with 4 Bars -->
  <g transform="translate(8, 16)">
    <!-- Background Circle (subtle) -->
    <circle cx="32" cy="24" r="28" fill="url(#glowGradient)" opacity="0.4"/>
    
    <!-- W Shape - 4 Rising Bars: 高-低-高-最高 -->
    <!-- Bar 1 (Left - Medium) -->
    <rect x="12" y="20" width="9" height="28" rx="2.5" fill="url(#wGradient)">
      <animate attributeName="height" values="28;30;28" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="20;18;20" dur="2s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Bar 2 (Center-Left - Lowest, W valley) -->
    <rect x="24" y="28" width="9" height="20" rx="2.5" fill="url(#wGradient)">
      <animate attributeName="height" values="20;22;20" dur="2s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="28;26;28" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Bar 3 (Center-Right - Medium-High) -->
    <rect x="36" y="16" width="9" height="32" rx="2.5" fill="url(#wGradient)">
      <animate attributeName="height" values="32;34;32" dur="2s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="16;14;16" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Bar 4 (Right - Highest, Rising!) -->
    <rect x="48" y="8" width="9" height="40" rx="2.5" fill="url(#wGradient)">
      <animate attributeName="height" values="40;43;40" dur="2s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="y" values="8;5;8" dur="2s" begin="0.9s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Annotation Tag Icons (业务相关) -->
    <g opacity="0.8">
      <!-- Tag 1 -->
      <rect x="14" y="16" width="5" height="3" rx="0.8" fill="#52C41A"/>
      <!-- Tag 2 -->
      <rect x="26" y="24" width="5" height="3" rx="0.8" fill="#52C41A"/>
      <!-- Tag 3 -->
      <rect x="38" y="12" width="5" height="3" rx="0.8" fill="#52C41A"/>
      <!-- Tag 4 -->
      <rect x="50" y="4" width="5" height="3" rx="0.8" fill="#52C41A"/>
    </g>
    
    <!-- Success Arrow (最后上升) -->
    <path d="M 52 2 L 56 -2 L 60 2" 
          stroke="#52C41A" 
          stroke-width="2.5" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round">
      <animate attributeName="opacity" values="1;0.6;1" dur="1.5s" repeatCount="indefinite"/>
    </path>
    
    <!-- Data Points -->
    <circle cx="16.5" cy="18" r="2.5" fill="#FFFFFF">
      <animate attributeName="cy" values="18;16;18" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="28.5" cy="26" r="2.5" fill="#FFFFFF">
      <animate attributeName="cy" values="26;24;26" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40.5" cy="14" r="2.5" fill="#FFFFFF">
      <animate attributeName="cy" values="14;12;14" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="52.5" cy="6" r="2.5" fill="#FFFFFF">
      <animate attributeName="cy" values="6;3;6" dur="2s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Connecting Line (Growth Trend) -->
    <path d="M 16.5 18 L 28.5 26 L 40.5 14 L 52.5 6" 
          stroke="#FFFFFF" 
          stroke-width="1.8" 
          fill="none" 
          opacity="0.7"
          stroke-dasharray="3,3"
          stroke-linecap="round"
          stroke-linejoin="round">
      <animate attributeName="stroke-dashoffset" from="0" to="24" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Brand Text: 问视间 -->
  <text x="88" y="38" 
        font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" 
        font-size="22" 
        font-weight="700" 
        fill="currentColor"
        letter-spacing="0.5">
    问视间
  </text>

  <!-- English Text: Wins -->
  <text x="88" y="58" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="14" 
        font-weight="600" 
        fill="#1890FF"
        letter-spacing="2">
    WINS
  </text>

  <!-- Subtitle -->
  <text x="135" y="58" 
        font-family="PingFang SC, Microsoft YaHei, sans-serif" 
        font-size="11" 
        fill="currentColor" 
        opacity="0.65">
    标注赋能，智胜未来
  </text>
</svg>
