<svg width="280" height="80" viewBox="0 0 280 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:0.08" />
    </linearGradient>
  </defs>

  <!-- Logo Icon: "Wi" Shape -->
  <g transform="translate(6, 14)">
    <!-- Background Circle -->
    <circle cx="34" cy="26" r="30" fill="url(#glowGradient)" opacity="0.4"/>
    
    <!-- "W" Shape - 4 Tilted Bars forming W -->
    <!-- Bar 1: Left side, tilted right (↗) -->
    <g transform="rotate(-8 16 32)">
      <rect x="12" y="20" width="8" height="28" rx="2.5" fill="url(#wGradient)">
        <animate attributeName="height" values="28;30;28" dur="2s" repeatCount="indefinite"/>
      </rect>
    </g>
    
    <!-- Bar 2: Left-center, tilted left (↖) - W valley -->
    <g transform="rotate(12 24 36)">
      <rect x="22" y="28" width="8" height="20" rx="2.5" fill="url(#wGradient)">
        <animate attributeName="height" values="20;22;20" dur="2s" begin="0.25s" repeatCount="indefinite"/>
      </rect>
    </g>
    
    <!-- Bar 3: Right-center, tilted right (↗) -->
    <g transform="rotate(-10 36 30)">
      <rect x="34" y="18" width="8" height="30" rx="2.5" fill="url(#wGradient)">
        <animate attributeName="height" values="30;32;30" dur="2s" begin="0.5s" repeatCount="indefinite"/>
      </rect>
    </g>
    
    <!-- Bar 4: Right side, tilted left (↖) -->
    <g transform="rotate(8 48 26)">
      <rect x="46" y="14" width="8" height="34" rx="2.5" fill="url(#wGradient)">
        <animate attributeName="height" values="34;36;34" dur="2s" begin="0.75s" repeatCount="indefinite"/>
      </rect>
    </g>
    
    <!-- Bar 5: "i" shape - Straight vertical bar -->
    <rect x="60" y="8" width="8" height="40" rx="2.5" fill="url(#wGradient)">
      <animate attributeName="height" values="40;43;40" dur="2s" begin="1s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Red Dot on top of Bar 5 - forming "i" -->
    <circle cx="64" cy="3" r="3.5" fill="#FF4D4F">
      <animate attributeName="cy" values="3;1;3" dur="2s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3.5;4;3.5" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Wave Line (数据向好) -->
    <path d="M 16 32 Q 24 40 30 36 T 48 26 Q 56 22 64 8" 
          stroke="#FFFFFF" 
          stroke-width="2" 
          fill="none" 
          opacity="0.7"
          stroke-dasharray="4,4"
          stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" from="0" to="32" dur="2s" repeatCount="indefinite"/>
    </path>
    
    <!-- Data Points -->
    <circle cx="16" cy="32" r="2.5" fill="#FFFFFF">
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="36" r="2.5" fill="#FFFFFF">
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" begin="0.25s" repeatCount="indefinite"/>
    </circle>
    <circle cx="38" cy="30" r="2.5" fill="#FFFFFF">
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="26" r="2.5" fill="#FFFFFF">
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" begin="0.75s" repeatCount="indefinite"/>
    </circle>
    <circle cx="64" cy="16" r="2.5" fill="#FFFFFF">
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Success Arrow -->
    <path d="M 62 2 L 66 -2 L 70 2" 
          stroke="#52C41A" 
          stroke-width="2.5" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Brand Text: 问视间 -->
  <text x="90" y="38" 
        font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" 
        font-size="22" 
        font-weight="700" 
        fill="currentColor"
        letter-spacing="0.5">
    问视间
  </text>

  <!-- English Text: Wins -->
  <text x="90" y="58" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="14" 
        font-weight="600" 
        fill="#1890FF"
        letter-spacing="2">
    WINS
  </text>

  <!-- Subtitle -->
  <text x="138" y="58" 
        font-family="PingFang SC, Microsoft YaHei, sans-serif" 
        font-size="11" 
        fill="currentColor" 
        opacity="0.65">
    数据向好，智赢未来
  </text>
</svg>
