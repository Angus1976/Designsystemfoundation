<svg width="280" height="80" viewBox="0 0 280 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2E5FE8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#722ED1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#722ED1;stop-opacity:0.08" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Logo Icon: "Wi" based on hand-drawn sketch -->
  <g transform="translate(8, 16)">
    <!-- Background subtle glow -->
    <circle cx="32" cy="24" r="30" fill="url(#glowBg)" opacity="0.4"/>
    
    <!-- "W" - 3 strokes forming W shape -->
    <!-- Stroke 1: Left downward -->
    <path d="M 12 14 L 18 36" 
          stroke="url(#mainGradient)" 
          stroke-width="7" 
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"
          filter="url(#glow)">
      <animate attributeName="stroke-width" values="7;8;7" dur="2s" repeatCount="indefinite"/>
    </path>
    
    <!-- Stroke 2: Middle V (valley) -->
    <path d="M 18 36 L 26 22 L 34 36" 
          stroke="url(#mainGradient)" 
          stroke-width="7" 
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"
          filter="url(#glow)">
      <animate attributeName="stroke-width" values="7;8;7" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </path>
    
    <!-- Stroke 3: Right upward -->
    <path d="M 34 36 L 42 14" 
          stroke="url(#mainGradient)" 
          stroke-width="7" 
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"
          filter="url(#glow)">
      <animate attributeName="stroke-width" values="7;8;7" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </path>
    
    <!-- "i" - 2 strokes forming i -->
    <!-- Stroke 4: i body (tall vertical) -->
    <path d="M 54 10 L 54 44" 
          stroke="url(#mainGradient)" 
          stroke-width="7" 
          stroke-linecap="round"
          fill="none"
          filter="url(#glow)">
      <animate attributeName="stroke-width" values="7;8;7" dur="2s" begin="0.9s" repeatCount="indefinite"/>
    </path>
    
    <!-- Red dot on top of "i" - THE KEY ELEMENT -->
    <circle cx="54" cy="2" r="4.5" fill="#FF4D4F" filter="url(#glow)">
      <animate attributeName="r" values="4.5;5.5;4.5" dur="2s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="2;0;2" dur="2s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Data flow particles (AI element) -->
    <g opacity="0.7">
      <circle cx="15" cy="25" r="2" fill="#52C41A">
        <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="22" cy="29" r="2" fill="#52C41A">
        <animate attributeName="opacity" values="0;1;0" dur="3s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="30" cy="29" r="2" fill="#52C41A">
        <animate attributeName="opacity" values="0;1;0" dur="3s" begin="1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="38" cy="25" r="2" fill="#52C41A">
        <animate attributeName="opacity" values="0;1;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="54" cy="27" r="2" fill="#52C41A">
        <animate attributeName="opacity" values="0;1;0" dur="3s" begin="2s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Upward arrow (success trend) -->
    <path d="M 52 -1 L 56 -5 L 60 -1" 
          stroke="#52C41A" 
          stroke-width="2.5" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Brand Text -->
  <g>
    <!-- Chinese Name: 问视间 -->
    <text x="88" y="34" 
          font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" 
          font-size="20" 
          font-weight="700" 
          fill="currentColor"
          letter-spacing="1">
      问视间
    </text>

    <!-- English Name: WinsAI -->
    <text x="88" y="52" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="13" 
          font-weight="700" 
          fill="#1890FF"
          letter-spacing="2">
      WINSAI
    </text>

    <!-- Divider -->
    <line x1="145" y1="43" x2="145" y2="52" stroke="currentColor" stroke-width="1" opacity="0.15"/>

    <!-- Tagline -->
    <text x="152" y="52" 
          font-family="PingFang SC, Microsoft YaHei, sans-serif" 
          font-size="10" 
          fill="currentColor" 
          opacity="0.65">
      数据友好 · 智赢未来
    </text>
  </g>
</svg>
