<svg width="280" height="80" viewBox="0 0 280 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 金属银色渐变 - 外侧 -->
    <linearGradient id="metalOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C0C0C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0A0A0;stop-opacity:1" />
    </linearGradient>
    
    <!-- 金属银色渐变 - 侧面 -->
    <linearGradient id="metalSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#888888;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#707070;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#606060;stop-opacity:1" />
    </linearGradient>
    
    <!-- 金属内壁 - 深色 -->
    <linearGradient id="metalInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#303030;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
    
    <!-- 蓝色能量球 -->
    <radialGradient id="energyBall" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9" />
      <stop offset="30%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1E90FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066CC;stop-opacity:1" />
    </radialGradient>
    
    <!-- 能量球光晕 -->
    <radialGradient id="energyGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#1E90FF;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#1E90FF;stop-opacity:0" />
    </radialGradient>
    
    <!-- 能量纹理 -->
    <radialGradient id="energyTexture" cx="45%" cy="35%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.6" />
      <stop offset="40%" style="stop-color:#00BFFF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0066CC;stop-opacity:0" />
    </radialGradient>
    
    <!-- 金属高光 -->
    <linearGradient id="metalHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.5" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.2" />
    </linearGradient>
    
    <!-- 阴影 -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    
    <filter id="strongShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.4"/>
    </filter>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Wi Logo -->
  <g transform="translate(8, 22)" filter="url(#strongShadow)">
    
    <!-- W - 第一个柱体 (左侧三角形) -->
    <g>
      <!-- 外侧面 - 左 -->
      <path d="M 8 28 L 4 32 L 4 44 L 8 40 Z" fill="url(#metalOuter)"/>
      <!-- 外侧面 - 右 -->
      <path d="M 18 23 L 22 27 L 22 39 L 18 35 Z" fill="url(#metalOuter)"/>
      <!-- 外侧面 - 底 -->
      <path d="M 4 44 L 8 40 L 18 35 L 22 39 Z" fill="url(#metalSide)"/>
      <!-- 外侧面 - 顶 -->
      <path d="M 4 32 L 8 28 L 18 23 L 22 27 Z" fill="url(#metalOuter)"/>
      
      <!-- 内壁 -->
      <path d="M 8 30 L 6 32 L 6 42 L 8 40 L 16 35 L 20 37 L 20 27 L 16 25 Z" fill="url(#metalInner)"/>
      
      <!-- 高光 -->
      <path d="M 8 28 L 18 23 L 18 26 L 8 31 Z" fill="url(#metalHighlight)" opacity="0.4"/>
    </g>
    
    <!-- W - 第二个柱体 (右侧三角形，M形) -->
    <g>
      <!-- 外侧面 - 左 -->
      <path d="M 24 27 L 20 31 L 20 43 L 24 39 Z" fill="url(#metalOuter)"/>
      <!-- 外侧面 - 右 -->
      <path d="M 38 23 L 42 27 L 42 39 L 38 35 Z" fill="url(#metalOuter)"/>
      <!-- 外侧面 - 底 -->
      <path d="M 20 43 L 24 39 L 38 35 L 42 39 Z" fill="url(#metalSide)"/>
      <!-- 外侧面 - 顶 -->
      <path d="M 20 31 L 24 27 L 38 23 L 42 27 Z" fill="url(#metalOuter)"/>
      
      <!-- 内壁 -->
      <path d="M 24 29 L 22 31 L 22 41 L 24 39 L 36 35 L 40 37 L 40 27 L 36 25 Z" fill="url(#metalInner)"/>
      
      <!-- 高光 -->
      <path d="M 24 27 L 38 23 L 38 26 L 24 30 Z" fill="url(#metalHighlight)" opacity="0.4"/>
    </g>
    
    <!-- i - 高柱体 -->
    <g>
      <!-- 外侧面 - 前 -->
      <path d="M 52 8 L 52 38 L 56 34 L 56 4 Z" fill="url(#metalOuter)"/>
      <!-- 外侧面 - 右 -->
      <path d="M 56 4 L 62 8 L 62 38 L 56 34 Z" fill="url(#metalSide)"/>
      <!-- 外侧面 - 顶 -->
      <path d="M 52 8 L 56 4 L 62 8 L 58 12 Z" fill="url(#metalOuter)"/>
      <!-- 外侧面 - 底 -->
      <path d="M 52 38 L 56 34 L 62 38 L 58 42 Z" fill="url(#metalSide)"/>
      
      <!-- 内壁 -->
      <rect x="54" y="10" width="4" height="24" fill="url(#metalInner)"/>
      
      <!-- 高光 -->
      <path d="M 52 8 L 56 4 L 56 6 L 52 10 Z" fill="url(#metalHighlight)" opacity="0.5"/>
      <rect x="52.5" y="10" width="1" height="26" fill="url(#metalHighlight)" opacity="0.3"/>
    </g>
    
  </g>

  <!-- 能量球 (蓝色发光球体) -->
  <g transform="translate(8, 22)">
    <!-- 外层光晕 -->
    <circle cx="57" cy="-6" r="12" fill="url(#energyGlow)" filter="url(#glow)">
      <animate attributeName="r" values="12;14;12" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <!-- 主球体 -->
    <circle cx="57" cy="-6" r="8" fill="url(#energyBall)">
      <animate attributeName="r" values="8;8.5;8" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- 能量纹理层1 -->
    <ellipse cx="55" cy="-8" rx="5" ry="4" fill="url(#energyTexture)" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" from="0 57 -6" to="360 57 -6" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- 能量纹理层2 -->
    <ellipse cx="59" cy="-5" rx="4" ry="5" fill="url(#energyTexture)" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="0 57 -6" to="-360 57 -6" dur="10s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- 高光点 -->
    <circle cx="55" cy="-9" r="2.5" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="56" cy="-8" r="1.5" fill="#FFFFFF" opacity="0.6"/>
    
    <!-- 流动光斑 -->
    <circle cx="58" cy="-4" r="1.5" fill="#00BFFF" opacity="0.6">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 品牌文字 -->
  <g>
    <text x="88" y="38" 
          font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" 
          font-size="20" 
          font-weight="700" 
          fill="#2C3E50"
          letter-spacing="1">
      问视间
    </text>

    <text x="88" y="56" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="13" 
          font-weight="700" 
          fill="#5A6C7D"
          letter-spacing="2">
      WINSAI
    </text>

    <line x1="145" y1="47" x2="145" y2="56" stroke="currentColor" stroke-width="1" opacity="0.15"/>

    <text x="152" y="56" 
          font-family="PingFang SC, Microsoft YaHei, sans-serif" 
          font-size="10" 
          fill="#7A8A9A" 
          opacity="0.75">
      数据友好 · 智赢未来
    </text>
  </g>
</svg>
