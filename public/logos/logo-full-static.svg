<svg width="280" height="80" viewBox="0 0 280 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 优化后的金属渐变 -->
    <linearGradient id="metalOuterStatic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F5F5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4D4D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8B8B8;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="metalSideStatic" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9E9E9E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#828282;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6E6E6E;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="metalInnerStatic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#404040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2A2A2A;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="energyBallStatic" cx="50%" cy="35%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="20%" style="stop-color:#E0F7FF;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#5DADE2;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#3498DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2874A6;stop-opacity:1" />
    </radialGradient>
    
    <radialGradient id="energyGlowStatic" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#85C1E9;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#5DADE2;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3498DB;stop-opacity:0" />
    </radialGradient>
    
    <linearGradient id="metalHighlightStatic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.3" />
    </linearGradient>
    
    <filter id="shadowStatic">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
    
    <filter id="glowStatic">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(8, 22)" filter="url(#shadowStatic)">
    
    <!-- W - 第一个柱体 -->
    <g>
      <path d="M 8 28 L 4 32 L 4 44 L 8 40 Z" fill="url(#metalOuterStatic)"/>
      <path d="M 18 23 L 22 27 L 22 39 L 18 35 Z" fill="url(#metalOuterStatic)"/>
      <path d="M 4 44 L 8 40 L 18 35 L 22 39 Z" fill="url(#metalSideStatic)"/>
      <path d="M 4 32 L 8 28 L 18 23 L 22 27 Z" fill="url(#metalOuterStatic)"/>
      <path d="M 8 30 L 6 32 L 6 42 L 8 40 L 16 35 L 20 37 L 20 27 L 16 25 Z" fill="url(#metalInnerStatic)"/>
      <path d="M 8 28 L 18 23 L 18 26 L 8 31 Z" fill="url(#metalHighlightStatic)" opacity="0.5"/>
    </g>
    
    <!-- W - 第二个柱体 -->
    <g>
      <path d="M 24 27 L 20 31 L 20 43 L 24 39 Z" fill="url(#metalOuterStatic)"/>
      <path d="M 38 23 L 42 27 L 42 39 L 38 35 Z" fill="url(#metalOuterStatic)"/>
      <path d="M 20 43 L 24 39 L 38 35 L 42 39 Z" fill="url(#metalSideStatic)"/>
      <path d="M 20 31 L 24 27 L 38 23 L 42 27 Z" fill="url(#metalOuterStatic)"/>
      <path d="M 24 29 L 22 31 L 22 41 L 24 39 L 36 35 L 40 37 L 40 27 L 36 25 Z" fill="url(#metalInnerStatic)"/>
      <path d="M 24 27 L 38 23 L 38 26 L 24 30 Z" fill="url(#metalHighlightStatic)" opacity="0.5"/>
    </g>
    
    <!-- i - 高柱体 -->
    <g>
      <path d="M 52 8 L 52 38 L 56 34 L 56 4 Z" fill="url(#metalOuterStatic)"/>
      <path d="M 56 4 L 62 8 L 62 38 L 56 34 Z" fill="url(#metalSideStatic)"/>
      <path d="M 52 8 L 56 4 L 62 8 L 58 12 Z" fill="url(#metalOuterStatic)"/>
      <path d="M 52 38 L 56 34 L 62 38 L 58 42 Z" fill="url(#metalSideStatic)"/>
      <rect x="54" y="10" width="4" height="24" fill="url(#metalInnerStatic)"/>
      <path d="M 52 8 L 56 4 L 56 6 L 52 10 Z" fill="url(#metalHighlightStatic)" opacity="0.6"/>
      <rect x="52.5" y="10" width="1" height="26" fill="url(#metalHighlightStatic)" opacity="0.4"/>
    </g>
    
  </g>

  <!-- 能量球 - 优化后的静态版 -->
  <g transform="translate(8, 22)">
    <circle cx="57" cy="-8" r="14" fill="url(#energyGlowStatic)" filter="url(#glowStatic)" opacity="0.75"/>
    <circle cx="57" cy="-8" r="9" fill="url(#energyBallStatic)"/>
    <circle cx="54" cy="-11" r="3" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="55.5" cy="-9.5" r="1.8" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="59" cy="-6" r="1.5" fill="#AED6F1" opacity="0.7"/>
  </g>

  <!-- 品牌文字 -->
  <g>
    <text x="88" y="38" 
          font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" 
          font-size="20" 
          font-weight="700" 
          fill="#34495E"
          letter-spacing="1">
      问视间
    </text>

    <text x="88" y="56" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="13" 
          font-weight="700" 
          fill="#5D6D7E"
          letter-spacing="2">
      WINSAI
    </text>

    <line x1="145" y1="47" x2="145" y2="56" stroke="currentColor" stroke-width="1" opacity="0.15"/>

    <text x="152" y="56" 
          font-family="PingFang SC, Microsoft YaHei, sans-serif" 
          font-size="10" 
          fill="#85929E" 
          opacity="0.8">
      数据友好 · 智赢未来
    </text>
  </g>
</svg>
