<svg width="280" height="80" viewBox="0 0 280 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 金属银色渐变 -->
    <linearGradient id="metalOuterStatic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C0C0C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0A0A0;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="metalSideStatic" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#888888;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#707070;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#606060;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="metalInnerStatic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#303030;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="energyBallStatic" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9" />
      <stop offset="30%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1E90FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066CC;stop-opacity:1" />
    </radialGradient>
    
    <radialGradient id="energyGlowStatic" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:0.7" />
      <stop offset="50%" style="stop-color:#1E90FF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1E90FF;stop-opacity:0" />
    </radialGradient>
    
    <linearGradient id="metalHighlightStatic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.5" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.2" />
    </linearGradient>
    
    <filter id="shadowStatic">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    
    <filter id="glowStatic">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(8, 22)" filter="url(#shadowStatic)">
    
    <!-- W - 第一个柱体 -->
    <g>
      <path d="M 8 28 L 4 32 L 4 44 L 8 40 Z" fill="url(#metalOuterStatic)"/>
      <path d="M 18 23 L 22 27 L 22 39 L 18 35 Z" fill="url(#metalOuterStatic)"/>
      <path d="M 4 44 L 8 40 L 18 35 L 22 39 Z" fill="url(#metalSideStatic)"/>
      <path d="M 4 32 L 8 28 L 18 23 L 22 27 Z" fill="url(#metalOuterStatic)"/>
      <path d="M 8 30 L 6 32 L 6 42 L 8 40 L 16 35 L 20 37 L 20 27 L 16 25 Z" fill="url(#metalInnerStatic)"/>
      <path d="M 8 28 L 18 23 L 18 26 L 8 31 Z" fill="url(#metalHighlightStatic)" opacity="0.4"/>
    </g>
    
    <!-- W - 第二个柱体 -->
    <g>
      <path d="M 24 27 L 20 31 L 20 43 L 24 39 Z" fill="url(#metalOuterStatic)"/>
      <path d="M 38 23 L 42 27 L 42 39 L 38 35 Z" fill="url(#metalOuterStatic)"/>
      <path d="M 20 43 L 24 39 L 38 35 L 42 39 Z" fill="url(#metalSideStatic)"/>
      <path d="M 20 31 L 24 27 L 38 23 L 42 27 Z" fill="url(#metalOuterStatic)"/>
      <path d="M 24 29 L 22 31 L 22 41 L 24 39 L 36 35 L 40 37 L 40 27 L 36 25 Z" fill="url(#metalInnerStatic)"/>
      <path d="M 24 27 L 38 23 L 38 26 L 24 30 Z" fill="url(#metalHighlightStatic)" opacity="0.4"/>
    </g>
    
    <!-- i - 高柱体 -->
    <g>
      <path d="M 52 8 L 52 38 L 56 34 L 56 4 Z" fill="url(#metalOuterStatic)"/>
      <path d="M 56 4 L 62 8 L 62 38 L 56 34 Z" fill="url(#metalSideStatic)"/>
      <path d="M 52 8 L 56 4 L 62 8 L 58 12 Z" fill="url(#metalOuterStatic)"/>
      <path d="M 52 38 L 56 34 L 62 38 L 58 42 Z" fill="url(#metalSideStatic)"/>
      <rect x="54" y="10" width="4" height="24" fill="url(#metalInnerStatic)"/>
      <path d="M 52 8 L 56 4 L 56 6 L 52 10 Z" fill="url(#metalHighlightStatic)" opacity="0.5"/>
      <rect x="52.5" y="10" width="1" height="26" fill="url(#metalHighlightStatic)" opacity="0.3"/>
    </g>
    
  </g>

  <!-- 能量球 -->
  <g transform="translate(8, 22)">
    <circle cx="57" cy="-6" r="12" fill="url(#energyGlowStatic)" filter="url(#glowStatic)"/>
    <circle cx="57" cy="-6" r="8" fill="url(#energyBallStatic)"/>
    <circle cx="55" cy="-9" r="2.5" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="56" cy="-8" r="1.5" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="58" cy="-4" r="1.5" fill="#00BFFF" opacity="0.6"/>
  </g>

  <!-- 品牌文字 -->
  <g>
    <text x="88" y="38" 
          font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" 
          font-size="20" 
          font-weight="700" 
          fill="#2C3E50"
          letter-spacing="1">
      问视间
    </text>

    <text x="88" y="56" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="13" 
          font-weight="700" 
          fill="#5A6C7D"
          letter-spacing="2">
      WINSAI
    </text>

    <line x1="145" y1="47" x2="145" y2="56" stroke="currentColor" stroke-width="1" opacity="0.15"/>

    <text x="152" y="56" 
          font-family="PingFang SC, Microsoft YaHei, sans-serif" 
          font-size="10" 
          fill="#7A8A9A" 
          opacity="0.75">
      数据友好 · 智赢未来
    </text>
  </g>
</svg>
