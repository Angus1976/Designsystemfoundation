<svg width="280" height="80" viewBox="0 0 280 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wGradientStatic" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGradientStatic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:0.08" />
    </linearGradient>
  </defs>

  <!-- Logo Icon: "Wi" Shape (Static) -->
  <g transform="translate(6, 14)">
    <!-- Background Circle -->
    <circle cx="34" cy="26" r="30" fill="url(#glowGradientStatic)" opacity="0.4"/>
    
    <!-- "W" Shape - 4 Tilted Bars -->
    <g transform="rotate(-8 16 32)">
      <rect x="12" y="20" width="8" height="28" rx="2.5" fill="url(#wGradientStatic)"/>
    </g>
    
    <g transform="rotate(12 24 36)">
      <rect x="22" y="28" width="8" height="20" rx="2.5" fill="url(#wGradientStatic)"/>
    </g>
    
    <g transform="rotate(-10 36 30)">
      <rect x="34" y="18" width="8" height="30" rx="2.5" fill="url(#wGradientStatic)"/>
    </g>
    
    <g transform="rotate(8 48 26)">
      <rect x="46" y="14" width="8" height="34" rx="2.5" fill="url(#wGradientStatic)"/>
    </g>
    
    <!-- Bar 5: "i" shape - Straight -->
    <rect x="60" y="8" width="8" height="40" rx="2.5" fill="url(#wGradientStatic)"/>
    
    <!-- Red Dot forming "i" -->
    <circle cx="64" cy="3" r="3.5" fill="#FF4D4F"/>
    
    <!-- Wave Line -->
    <path d="M 16 32 Q 24 40 30 36 T 48 26 Q 56 22 64 8" 
          stroke="#FFFFFF" 
          stroke-width="2" 
          fill="none" 
          opacity="0.7"
          stroke-linecap="round"/>
    
    <!-- Data Points -->
    <circle cx="16" cy="32" r="2.5" fill="#FFFFFF"/>
    <circle cx="30" cy="36" r="2.5" fill="#FFFFFF"/>
    <circle cx="38" cy="30" r="2.5" fill="#FFFFFF"/>
    <circle cx="50" cy="26" r="2.5" fill="#FFFFFF"/>
    <circle cx="64" cy="16" r="2.5" fill="#FFFFFF"/>
    
    <!-- Success Arrow -->
    <path d="M 62 2 L 66 -2 L 70 2" 
          stroke="#52C41A" 
          stroke-width="2.5" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>

  <!-- Brand Text -->
  <text x="90" y="38" 
        font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" 
        font-size="22" 
        font-weight="700" 
        fill="currentColor"
        letter-spacing="0.5">
    问视间
  </text>

  <text x="90" y="58" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="14" 
        font-weight="600" 
        fill="#1890FF"
        letter-spacing="2">
    WINS
  </text>

  <text x="138" y="58" 
        font-family="PingFang SC, Microsoft YaHei, sans-serif" 
        font-size="11" 
        fill="currentColor" 
        opacity="0.65">
    数据向好，智赢未来
  </text>
</svg>
