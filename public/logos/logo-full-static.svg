<svg width="280" height="80" viewBox="0 0 280 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 专业深蓝渐变 -->
    <linearGradient id="professionalGradStatic" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0B2847;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#597EF7;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="topFaceStatic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#40A9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1890FF;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="leftFaceStatic" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0B2847;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1677D9;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="rightFaceStatic" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1677D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#597EF7;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadowStatic">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Logo Icon: Geometric "Wi" -->
  <g transform="translate(8, 18)" filter="url(#shadowStatic)">
    
    <!-- W - First Bar -->
    <g>
      <path d="M 8 20 L 14 16 L 14 26 L 8 30 Z" fill="url(#topFaceStatic)"/>
      <path d="M 8 20 L 8 30 L 12 36 L 12 26 Z" fill="url(#leftFaceStatic)"/>
      <path d="M 14 16 L 14 26 L 18 32 L 18 22 Z" fill="url(#rightFaceStatic)"/>
    </g>
    
    <!-- W - Second Bar -->
    <g>
      <path d="M 20 30 L 26 26 L 26 32 L 20 36 Z" fill="url(#topFaceStatic)"/>
      <path d="M 20 30 L 20 36 L 24 40 L 24 34 Z" fill="url(#leftFaceStatic)"/>
      <path d="M 26 26 L 26 32 L 30 36 L 30 30 Z" fill="url(#rightFaceStatic)"/>
    </g>
    
    <!-- W - Third Bar -->
    <g>
      <path d="M 32 22 L 38 18 L 38 28 L 32 32 Z" fill="url(#topFaceStatic)"/>
      <path d="M 32 22 L 32 32 L 36 38 L 36 28 Z" fill="url(#leftFaceStatic)"/>
      <path d="M 38 18 L 38 28 L 42 34 L 42 24 Z" fill="url(#rightFaceStatic)"/>
    </g>
    
    <!-- i - Vertical Bar -->
    <g>
      <path d="M 52 8 L 58 4 L 58 36 L 52 40 Z" fill="url(#topFaceStatic)"/>
      <path d="M 52 8 L 52 40 L 56 44 L 56 12 Z" fill="url(#leftFaceStatic)"/>
      <path d="M 58 4 L 58 36 L 62 40 L 62 8 Z" fill="url(#rightFaceStatic)"/>
    </g>
    
    <!-- Red Dot -->
    <circle cx="55" cy="-2" r="5" fill="#FF4D4F"/>
    
    <!-- Data line -->
    <path d="M 11 28 Q 24 34 37 28 Q 50 22 55 12" 
          stroke="#52C41A" 
          stroke-width="1.5" 
          fill="none" 
          opacity="0.5"
          stroke-dasharray="3,3"/>
    
    <!-- Arrow -->
    <path d="M 53 -5 L 57 -9 L 61 -5" 
          stroke="#52C41A" 
          stroke-width="2.5" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>

  <!-- Brand Text -->
  <g>
    <text x="88" y="34" 
          font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" 
          font-size="20" 
          font-weight="700" 
          fill="#0B2847"
          letter-spacing="1">
      问视间
    </text>

    <text x="88" y="52" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="13" 
          font-weight="700" 
          fill="#1890FF"
          letter-spacing="2">
      WINSAI
    </text>

    <line x1="145" y1="43" x2="145" y2="52" stroke="currentColor" stroke-width="1" opacity="0.15"/>

    <text x="152" y="52" 
          font-family="PingFang SC, Microsoft YaHei, sans-serif" 
          font-size="10" 
          fill="#5A5A5A" 
          opacity="0.75">
      数据友好 · 智赢未来
    </text>
  </g>
</svg>
