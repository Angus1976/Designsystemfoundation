<svg width="280" height="80" viewBox="0 0 280 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wGradientStatic" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGradientStatic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:0.08" />
    </linearGradient>
  </defs>

  <!-- Logo Icon: W Shape with 4 Bars (Static) -->
  <g transform="translate(8, 16)">
    <!-- Background Circle -->
    <circle cx="32" cy="24" r="28" fill="url(#glowGradientStatic)" opacity="0.4"/>
    
    <!-- W Shape - 4 Bars: 高-低-高-最高 -->
    <rect x="12" y="20" width="9" height="28" rx="2.5" fill="url(#wGradientStatic)"/>
    <rect x="24" y="28" width="9" height="20" rx="2.5" fill="url(#wGradientStatic)"/>
    <rect x="36" y="16" width="9" height="32" rx="2.5" fill="url(#wGradientStatic)"/>
    <rect x="48" y="8" width="9" height="40" rx="2.5" fill="url(#wGradientStatic)"/>
    
    <!-- Annotation Tag Icons -->
    <g opacity="0.8">
      <rect x="14" y="16" width="5" height="3" rx="0.8" fill="#52C41A"/>
      <rect x="26" y="24" width="5" height="3" rx="0.8" fill="#52C41A"/>
      <rect x="38" y="12" width="5" height="3" rx="0.8" fill="#52C41A"/>
      <rect x="50" y="4" width="5" height="3" rx="0.8" fill="#52C41A"/>
    </g>
    
    <!-- Success Arrow -->
    <path d="M 52 2 L 56 -2 L 60 2" 
          stroke="#52C41A" 
          stroke-width="2.5" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    
    <!-- Data Points -->
    <circle cx="16.5" cy="18" r="2.5" fill="#FFFFFF"/>
    <circle cx="28.5" cy="26" r="2.5" fill="#FFFFFF"/>
    <circle cx="40.5" cy="14" r="2.5" fill="#FFFFFF"/>
    <circle cx="52.5" cy="6" r="2.5" fill="#FFFFFF"/>
    
    <!-- Connecting Line -->
    <path d="M 16.5 18 L 28.5 26 L 40.5 14 L 52.5 6" 
          stroke="#FFFFFF" 
          stroke-width="1.8" 
          fill="none" 
          opacity="0.7"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <!-- Brand Text -->
  <text x="88" y="38" 
        font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" 
        font-size="22" 
        font-weight="700" 
        fill="currentColor"
        letter-spacing="0.5">
    问视间
  </text>

  <text x="88" y="58" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="14" 
        font-weight="600" 
        fill="#1890FF"
        letter-spacing="2">
    WINS
  </text>

  <text x="135" y="58" 
        font-family="PingFang SC, Microsoft YaHei, sans-serif" 
        font-size="11" 
        fill="currentColor" 
        opacity="0.65">
    标注赋能，智胜未来
  </text>
</svg>
