<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad64" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2E5FE8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#722ED1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bg64" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#722ED1;stop-opacity:0.06" />
    </linearGradient>
    <filter id="glow64">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="28" fill="url(#bg64)"/>

  <!-- "Wi" Shape -->
  <!-- W: 3 strokes -->
  <path d="M 14 18 L 18 36" 
        stroke="url(#grad64)" 
        stroke-width="5" 
        stroke-linecap="round"
        fill="none"
        filter="url(#glow64)"/>
  
  <path d="M 18 36 L 24 24 L 30 36" 
        stroke="url(#grad64)" 
        stroke-width="5" 
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        filter="url(#glow64)"/>
  
  <path d="M 30 36 L 36 18" 
        stroke="url(#grad64)" 
        stroke-width="5" 
        stroke-linecap="round"
        fill="none"
        filter="url(#glow64)"/>
  
  <!-- i: vertical + dot -->
  <path d="M 46 16 L 46 42" 
        stroke="url(#grad64)" 
        stroke-width="5" 
        stroke-linecap="round"
        fill="none"
        filter="url(#glow64)"/>
  
  <circle cx="46" cy="10" r="3.5" fill="#FF4D4F" filter="url(#glow64)"/>
  
  <!-- Data points -->
  <circle cx="16" cy="27" r="1.5" fill="#52C41A" opacity="0.7"/>
  <circle cx="21" cy="30" r="1.5" fill="#52C41A" opacity="0.7"/>
  <circle cx="27" cy="30" r="1.5" fill="#52C41A" opacity="0.7"/>
  <circle cx="33" cy="27" r="1.5" fill="#52C41A" opacity="0.7"/>
  <circle cx="46" cy="29" r="1.5" fill="#52C41A" opacity="0.7"/>
  
  <!-- Arrow -->
  <path d="M 44 8 L 47 5 L 50 8" 
        stroke="#52C41A" 
        stroke-width="2" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
</svg>
