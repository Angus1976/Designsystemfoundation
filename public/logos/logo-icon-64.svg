<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="metal64" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C0C0C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0A0A0;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="metalSide64" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#888888;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#606060;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="metalInner64" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#303030;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="energy64" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9" />
      <stop offset="30%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1E90FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066CC;stop-opacity:1" />
    </radialGradient>
    
    <radialGradient id="glow64" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#1E90FF;stop-opacity:0" />
    </radialGradient>
    
    <filter id="shadow64">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
    
    <filter id="glow64F">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(12, 26)" filter="url(#shadow64)">
    
    <!-- W柱1 -->
    <g>
      <path d="M 3 16 L 1 18 L 1 26 L 3 24 Z" fill="url(#metal64)"/>
      <path d="M 8 13 L 10 15 L 10 23 L 8 21 Z" fill="url(#metal64)"/>
      <path d="M 1 26 L 3 24 L 8 21 L 10 23 Z" fill="url(#metalSide64)"/>
      <path d="M 1 18 L 3 16 L 8 13 L 10 15 Z" fill="url(#metal64)"/>
      <path d="M 3.5 17 L 2 18.5 L 2 24.5 L 3.5 23 L 7.5 20.5 L 9 21.5 L 9 15.5 L 7.5 14.5 Z" fill="url(#metalInner64)"/>
    </g>
    
    <!-- W柱2 -->
    <g>
      <path d="M 11 15 L 9 17 L 9 25 L 11 23 Z" fill="url(#metal64)"/>
      <path d="M 18 13 L 20 15 L 20 23 L 18 21 Z" fill="url(#metal64)"/>
      <path d="M 9 25 L 11 23 L 18 21 L 20 23 Z" fill="url(#metalSide64)"/>
      <path d="M 9 17 L 11 15 L 18 13 L 20 15 Z" fill="url(#metal64)"/>
      <path d="M 11.5 16 L 10 17.5 L 10 23.5 L 11.5 22 L 17.5 20 L 19 21 L 19 15 L 17.5 14 Z" fill="url(#metalInner64)"/>
    </g>
    
    <!-- i柱 -->
    <g>
      <path d="M 26 5 L 26 22 L 28 20 L 28 3 Z" fill="url(#metal64)"/>
      <path d="M 28 3 L 31 5 L 31 22 L 28 20 Z" fill="url(#metalSide64)"/>
      <path d="M 26 5 L 28 3 L 31 5 L 29 7 Z" fill="url(#metal64)"/>
      <rect x="27" y="6" width="2" height="14" fill="url(#metalInner64)"/>
    </g>
    
  </g>

  <!-- 能量球 -->
  <g transform="translate(12, 26)">
    <circle cx="28.5" cy="-1" r="7" fill="url(#glow64)" filter="url(#glow64F)"/>
    <circle cx="28.5" cy="-1" r="5" fill="url(#energy64)"/>
    <circle cx="27" cy="-3" r="1.5" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="29" cy="0" r="1" fill="#00BFFF" opacity="0.6"/>
  </g>
</svg>
