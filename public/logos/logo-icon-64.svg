<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wGrad64" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad64" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:0.06" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="28" fill="url(#bgGrad64)"/>

  <!-- "Wi" Shape -->
  <!-- W: 4 Tilted Bars -->
  <g transform="rotate(-8 13 36)">
    <rect x="10" y="26" width="6" height="20" rx="2" fill="url(#wGrad64)"/>
  </g>
  
  <g transform="rotate(12 19 40)">
    <rect x="17" y="34" width="6" height="14" rx="2" fill="url(#wGrad64)"/>
  </g>
  
  <g transform="rotate(-10 28 34)">
    <rect x="26" y="24" width="6" height="20" rx="2" fill="url(#wGrad64)"/>
  </g>
  
  <g transform="rotate(8 37 30)">
    <rect x="35" y="20" width="6" height="24" rx="2" fill="url(#wGrad64)"/>
  </g>
  
  <!-- i: Straight bar + red dot -->
  <rect x="46" y="14" width="6" height="30" rx="2" fill="url(#wGrad64)"/>
  <circle cx="49" cy="10" r="3" fill="#FF4D4F"/>
  
  <!-- Wave Line -->
  <path d="M 13 36 Q 19 42 25 38 T 38 28 Q 43 24 49 14" 
        stroke="#FFFFFF" 
        stroke-width="1.8" 
        fill="none" 
        opacity="0.6"
        stroke-linecap="round"/>
  
  <!-- Data Points -->
  <circle cx="13" cy="36" r="2" fill="#FFFFFF"/>
  <circle cx="25" cy="40" r="2" fill="#FFFFFF"/>
  <circle cx="29" cy="34" r="2" fill="#FFFFFF"/>
  <circle cx="38" cy="30" r="2" fill="#FFFFFF"/>
  <circle cx="49" cy="22" r="2" fill="#FFFFFF"/>
  
  <!-- Arrow -->
  <path d="M 47 10 L 51 6 L 55 10" 
        stroke="#52C41A" 
        stroke-width="2" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
</svg>
