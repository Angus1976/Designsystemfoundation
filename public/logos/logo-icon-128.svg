<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad128" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2E5FE8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#722ED1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bg128" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#722ED1;stop-opacity:0.06" />
    </linearGradient>
    <filter id="glow128">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow128">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="64" cy="64" r="56" fill="url(#bg128)"/>

  <!-- "Wi" Shape -->
  <g filter="url(#shadow128)">
    <!-- W: 3 strokes -->
    <path d="M 28 36 L 36 72" 
          stroke="url(#grad128)" 
          stroke-width="10" 
          stroke-linecap="round"
          fill="none"
          filter="url(#glow128)"/>
    
    <path d="M 36 72 L 48 48 L 60 72" 
          stroke="url(#grad128)" 
          stroke-width="10" 
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"
          filter="url(#glow128)"/>
    
    <path d="M 60 72 L 72 36" 
          stroke="url(#grad128)" 
          stroke-width="10" 
          stroke-linecap="round"
          fill="none"
          filter="url(#glow128)"/>
    
    <!-- i: vertical + dot -->
    <path d="M 92 32 L 92 84" 
          stroke="url(#grad128)" 
          stroke-width="10" 
          stroke-linecap="round"
          fill="none"
          filter="url(#glow128)"/>
  </g>
  
  <circle cx="92" cy="20" r="7" fill="#FF4D4F" filter="url(#shadow128)"/>
  
  <!-- Data points -->
  <g filter="url(#shadow128)">
    <circle cx="32" cy="54" r="3" fill="#52C41A" opacity="0.7"/>
    <circle cx="42" cy="60" r="3" fill="#52C41A" opacity="0.7"/>
    <circle cx="54" cy="60" r="3" fill="#52C41A" opacity="0.7"/>
    <circle cx="66" cy="54" r="3" fill="#52C41A" opacity="0.7"/>
    <circle cx="92" cy="58" r="3" fill="#52C41A" opacity="0.7"/>
  </g>
  
  <!-- Arrow -->
  <path d="M 88 16 L 94 10 L 100 16" 
        stroke="#52C41A" 
        stroke-width="4" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Baseline -->
  <line x1="24" y1="90" x2="100" y2="90" stroke="#1890FF" stroke-width="1" opacity="0.1"/>
</svg>
