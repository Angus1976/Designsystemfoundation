<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wGrad128" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad128" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:0.06" />
    </linearGradient>
    <filter id="shadow128">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="64" cy="64" r="56" fill="url(#bgGrad128)"/>

  <!-- "Wi" Shape -->
  <g filter="url(#shadow128)">
    <!-- W: 4 Tilted Bars -->
    <g transform="rotate(-8 26 72)">
      <rect x="20" y="52" width="12" height="40" rx="4" fill="url(#wGrad128)"/>
    </g>
    
    <g transform="rotate(12 38 80)">
      <rect x="34" y="68" width="12" height="28" rx="4" fill="url(#wGrad128)"/>
    </g>
    
    <g transform="rotate(-10 56 68)">
      <rect x="52" y="48" width="12" height="40" rx="4" fill="url(#wGrad128)"/>
    </g>
    
    <g transform="rotate(8 74 60)">
      <rect x="70" y="40" width="12" height="48" rx="4" fill="url(#wGrad128)"/>
    </g>
    
    <!-- i: Straight bar + red dot -->
    <rect x="92" y="28" width="12" height="60" rx="4" fill="url(#wGrad128)"/>
  </g>
  
  <!-- Red Dot for "i" -->
  <circle cx="98" cy="20" r="6" fill="#FF4D4F" filter="url(#shadow128)"/>
  
  <!-- Wave Line -->
  <path d="M 26 72 Q 38 84 50 76 T 76 60 Q 86 52 98 28" 
        stroke="#FFFFFF" 
        stroke-width="3" 
        fill="none" 
        opacity="0.6"
        stroke-linecap="round"/>
  
  <!-- Data Points -->
  <g filter="url(#shadow128)">
    <circle cx="26" cy="72" r="4" fill="#FFFFFF"/>
    <circle cx="50" cy="80" r="4" fill="#FFFFFF"/>
    <circle cx="58" cy="68" r="4" fill="#FFFFFF"/>
    <circle cx="76" cy="60" r="4" fill="#FFFFFF"/>
    <circle cx="98" cy="44" r="4" fill="#FFFFFF"/>
  </g>
  
  <!-- Arrow -->
  <path d="M 94 20 L 102 12 L 110 20" 
        stroke="#52C41A" 
        stroke-width="4" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Baseline Grid -->
  <line x1="16" y1="96" x2="108" y2="96" stroke="#1890FF" stroke-width="1" opacity="0.12"/>
</svg>
