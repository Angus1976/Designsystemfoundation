<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wGrad128" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad128" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:0.05" />
    </linearGradient>
    <filter id="shadow128">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="64" cy="64" r="56" fill="url(#bgGrad128)"/>

  <!-- W Shape - Five Rising Bars -->
  <g filter="url(#shadow128)">
    <!-- Left Bar (Lowest) -->
    <rect x="24" y="72" width="14" height="32" rx="4" fill="url(#wGrad128)"/>
    
    <!-- Left-Middle Bar (Low-Medium) -->
    <rect x="42" y="56" width="14" height="48" rx="4" fill="url(#wGrad128)"/>
    
    <!-- Middle Bar (Medium) -->
    <rect x="60" y="48" width="14" height="56" rx="4" fill="url(#wGrad128)"/>
    
    <!-- Right-Middle Bar (Medium-High) -->
    <rect x="78" y="40" width="14" height="64" rx="4" fill="url(#wGrad128)"/>
    
    <!-- Right Bar (Highest) -->
    <rect x="96" y="32" width="14" height="72" rx="4" fill="url(#wGrad128)"/>
  </g>
  
  <!-- Success Arrow -->
  <path d="M 100 24 L 107 16 L 114 24" 
        stroke="#52C41A" 
        stroke-width="4" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Data Points -->
  <circle cx="31" cy="68" r="5" fill="#FFFFFF" filter="url(#shadow128)"/>
  <circle cx="49" cy="52" r="5" fill="#FFFFFF" filter="url(#shadow128)"/>
  <circle cx="67" cy="44" r="5" fill="#FFFFFF" filter="url(#shadow128)"/>
  <circle cx="85" cy="36" r="5" fill="#FFFFFF" filter="url(#shadow128)"/>
  <circle cx="103" cy="28" r="5" fill="#FFFFFF" filter="url(#shadow128)"/>
  
  <!-- Growth Trend Line -->
  <path d="M 31 68 L 49 52 L 67 44 L 85 36 L 103 28" 
        stroke="#FFFFFF" 
        stroke-width="3" 
        fill="none" 
        opacity="0.6"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  
  <!-- Baseline Grid (subtle) -->
  <line x1="20" y1="104" x2="114" y2="104" stroke="#1890FF" stroke-width="1" opacity="0.2"/>
  <line x1="20" y1="88" x2="114" y2="88" stroke="#1890FF" stroke-width="1" opacity="0.15"/>
  <line x1="20" y1="72" x2="114" y2="72" stroke="#1890FF" stroke-width="1" opacity="0.1"/>
</svg>
