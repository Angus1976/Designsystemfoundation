<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="top256" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#40A9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1890FF;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="left256" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0B2847;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1677D9;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="right256" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1677D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#597EF7;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow256">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="128" cy="110" r="100" fill="#F0F5FF" opacity="0.5"/>

  <g transform="translate(40, 80)" filter="url(#shadow256)">
    
    <!-- W - Bar 1 -->
    <g>
      <path d="M 8 56 L 24 48 L 24 80 L 8 88 Z" fill="url(#top256)"/>
      <path d="M 8 56 L 8 88 L 16 104 L 16 72 Z" fill="url(#left256)"/>
      <path d="M 24 48 L 24 80 L 32 96 L 32 64 Z" fill="url(#right256)"/>
    </g>
    
    <!-- W - Bar 2 -->
    <g>
      <path d="M 40 80 L 56 72 L 56 88 L 40 96 Z" fill="url(#top256)"/>
      <path d="M 40 80 L 40 96 L 48 104 L 48 88 Z" fill="url(#left256)"/>
      <path d="M 56 72 L 56 88 L 64 96 L 64 80 Z" fill="url(#right256)"/>
    </g>
    
    <!-- W - Bar 3 -->
    <g>
      <path d="M 72 60 L 88 52 L 88 84 L 72 92 Z" fill="url(#top256)"/>
      <path d="M 72 60 L 72 92 L 80 108 L 80 76 Z" fill="url(#left256)"/>
      <path d="M 88 52 L 88 84 L 96 100 L 96 68 Z" fill="url(#right256)"/>
    </g>
    
    <!-- i - Bar 4 -->
    <g>
      <path d="M 128 24 L 144 16 L 144 112 L 128 120 Z" fill="url(#top256)"/>
      <path d="M 128 24 L 128 120 L 136 128 L 136 32 Z" fill="url(#left256)"/>
      <path d="M 144 16 L 144 112 L 152 120 L 152 24 Z" fill="url(#right256)"/>
    </g>
    
    <!-- Red Dot -->
    <circle cx="136" cy="0" r="14" fill="#FF4D4F"/>
    
    <!-- Arrow -->
    <path d="M 128 -8 L 140 -20 L 152 -8" 
          stroke="#52C41A" 
          stroke-width="6" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>
  
  <!-- Baseline -->
  <line x1="40" y1="210" x2="216" y2="210" stroke="#1890FF" stroke-width="2" opacity="0.1"/>

  <!-- Text -->
  <g>
    <text x="128" y="228" 
          font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" 
          font-size="28" 
          font-weight="700" 
          fill="#0B2847"
          text-anchor="middle"
          letter-spacing="2">
      问视间
