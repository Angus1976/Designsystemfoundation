<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wSq256" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgSq256" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:0.06" />
    </linearGradient>
    <filter id="shadow256">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="128" cy="108" r="96" fill="url(#bgSq256)"/>

  <!-- W Shape - 4 Bars -->
  <g filter="url(#shadow256)">
    <!-- Bar 1 (Medium) -->
    <rect x="56" y="112" width="32" height="96" rx="8" fill="url(#wSq256)"/>
    
    <!-- Bar 2 (Lowest - W valley) -->
    <rect x="100" y="144" width="32" height="64" rx="8" fill="url(#wSq256)"/>
    
    <!-- Bar 3 (Medium-High) -->
    <rect x="144" y="96" width="32" height="112" rx="8" fill="url(#wSq256)"/>
    
    <!-- Bar 4 (Highest - Rising!) -->
    <rect x="188" y="64" width="32" height="144" rx="8" fill="url(#wSq256)"/>
  </g>
  
  <!-- Annotation Tags -->
  <g opacity="0.8">
    <rect x="64" y="96" width="16" height="10" rx="3" fill="#52C41A"/>
    <rect x="108" y="128" width="16" height="10" rx="3" fill="#52C41A"/>
    <rect x="152" y="80" width="16" height="10" rx="3" fill="#52C41A"/>
    <rect x="196" y="48" width="16" height="10" rx="3" fill="#52C41A"/>
  </g>
  
  <!-- Success Arrow -->
  <path d="M 196 48 L 208 32 L 220 48" 
        stroke="#52C41A" 
        stroke-width="6" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Data Points -->
  <g filter="url(#shadow256)">
    <circle cx="72" cy="104" r="8" fill="#FFFFFF"/>
    <circle cx="116" cy="136" r="8" fill="#FFFFFF"/>
    <circle cx="160" cy="88" r="8" fill="#FFFFFF"/>
    <circle cx="204" cy="56" r="8" fill="#FFFFFF"/>
  </g>
  
  <!-- Growth Trend Line -->
  <path d="M 72 104 L 116 136 L 160 88 L 204 56" 
        stroke="#FFFFFF" 
        stroke-width="5" 
        fill="none" 
        opacity="0.6"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  
  <!-- Baseline Grid -->
  <g opacity="0.12">
    <line x1="48" y1="208" x2="224" y2="208" stroke="#1890FF" stroke-width="2"/>
    <line x1="48" y1="176" x2="224" y2="176" stroke="#1890FF" stroke-width="1.5"/>
  </g>

  <!-- Text Section -->
  <g>
    <!-- Chinese Name -->
    <text x="128" y="232" 
          font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" 
          font-size="32" 
          font-weight="700" 
          fill="currentColor"
          text-anchor="middle"
          letter-spacing="2">
      问视间
    </text>

    <!-- English Name -->
    <text x="128" y="252" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="18" 
          font-weight="700" 
          fill="#1890FF"
          text-anchor="middle"
          letter-spacing="4">
      WINS
    </text>
  </g>
</svg>
