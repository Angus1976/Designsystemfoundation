<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="metal256" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F5F5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4D4D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8B8B8;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="metalSide256" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9E9E9E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6E6E6E;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="metalInner256" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#404040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2A2A2A;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="energy256" cx="50%" cy="35%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="20%" style="stop-color:#E0F7FF;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#5DADE2;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#3498DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2874A6;stop-opacity:1" />
    </radialGradient>
    
    <radialGradient id="glow256" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#85C1E9;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#3498DB;stop-opacity:0" />
    </radialGradient>
    
    <linearGradient id="highlight256" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.1" />
    </linearGradient>
    
    <filter id="shadow256">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
    
    <filter id="glow256F">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(48, 104)" filter="url(#shadow256)">
    
    <!-- W柱1 -->
    <g>
      <path d="M 12 64 L 4 72 L 4 104 L 12 96 Z" fill="url(#metal256)"/>
      <path d="M 32 52 L 40 60 L 40 92 L 32 84 Z" fill="url(#metal256)"/>
      <path d="M 4 104 L 12 96 L 32 84 L 40 92 Z" fill="url(#metalSide256)"/>
      <path d="M 4 72 L 12 64 L 32 52 L 40 60 Z" fill="url(#metal256)"/>
      <path d="M 14 68 L 8 74 L 8 100 L 14 94 L 30 84 L 36 88 L 36 62 L 30 56 Z" fill="url(#metalInner256)"/>
      <path d="M 12 64 L 32 52 L 32 58 L 12 70 Z" fill="url(#highlight256)" opacity="0.5"/>
    </g>
    
    <!-- W柱2 -->
    <g>
      <path d="M 44 60 L 36 68 L 36 100 L 44 92 Z" fill="url(#metal256)"/>
      <path d="M 72 52 L 80 60 L 80 92 L 72 84 Z" fill="url(#metal256)"/>
      <path d="M 36 100 L 44 92 L 72 84 L 80 92 Z" fill="url(#metalSide256)"/>
      <path d="M 36 68 L 44 60 L 72 52 L 80 60 Z" fill="url(#metal256)"/>
      <path d="M 46 64 L 40 70 L 40 96 L 46 90 L 70 82 L 76 86 L 76 60 L 70 54 Z" fill="url(#metalInner256)"/>
      <path d="M 44 60 L 72 52 L 72 58 L 44 66 Z" fill="url(#highlight256)" opacity="0.5"/>
    </g>
    
    <!-- i柱 -->
    <g>
      <path d="M 104 20 L 104 88 L 112 80 L 112 12 Z" fill="url(#metal256)"/>
      <path d="M 112 12 L 124 20 L 124 88 L 112 80 Z" fill="url(#metalSide256)"/>
      <path d="M 104 20 L 112 12 L 124 20 L 116 28 Z" fill="url(#metal256)"/>
      <path d="M 104 88 L 112 80 L 124 88 L 116 96 Z" fill="url(#metalSide256)"/>
      <rect x="108" y="24" width="8" height="56" fill="url(#metalInner256)"/>
      <path d="M 104 20 L 112 12 L 112 18 L 104 26 Z" fill="url(#highlight256)" opacity="0.6"/>
      <rect x="105" y="26" width="3" height="58" fill="url(#highlight256)" opacity="0.4"/>
    </g>
    
  </g>

  <!-- 能量球 - 微调后 -->
  <g transform="translate(48, 104)">
    <circle cx="114" cy="-10" r="32" fill="url(#glow256)" filter="url(#glow256F)" opacity="0.75"/>
    <circle cx="114" cy="-10" r="22" fill="url(#energy256)"/>
    <circle cx="108" cy="-16" r="7" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="111" cy="-13" r="4.5" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="118" cy="-5" r="4" fill="#AED6F1" opacity="0.7"/>
  </g>

  <!-- 文字 -->
  <g>
    <text x="128" y="220" 
          font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" 
          font-size="28" 
          font-weight="700" 
          fill="#34495E"
          text-anchor="middle"
          letter-spacing="2">
      问视间
    </text>

    <text x="128" y="246" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="16" 
          font-weight="700" 
          fill="#5D6D7E"
          text-anchor="middle"
          letter-spacing="3">
      WINSAI
    </text>
  </g>
</svg>
