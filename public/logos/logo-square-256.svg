<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wSq256" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgSq256" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:0.05" />
    </linearGradient>
    <filter id="shadow256">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="128" cy="108" r="96" fill="url(#bgSq256)"/>

  <!-- W Shape - Five Rising Bars -->
  <g filter="url(#shadow256)">
    <!-- Left Bar (Lowest) -->
    <rect x="48" y="132" width="24" height="56" rx="6" fill="url(#wSq256)"/>
    
    <!-- Left-Middle Bar -->
    <rect x="80" y="104" width="24" height="84" rx="6" fill="url(#wSq256)"/>
    
    <!-- Middle Bar -->
    <rect x="112" y="88" width="24" height="100" rx="6" fill="url(#wSq256)"/>
    
    <!-- Right-Middle Bar -->
    <rect x="144" y="72" width="24" height="116" rx="6" fill="url(#wSq256)"/>
    
    <!-- Right Bar (Highest) -->
    <rect x="176" y="56" width="24" height="132" rx="6" fill="url(#wSq256)"/>
  </g>
  
  <!-- Success Arrow -->
  <path d="M 182 44 L 192 32 L 202 44" 
        stroke="#52C41A" 
        stroke-width="6" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Data Points -->
  <g filter="url(#shadow256)">
    <circle cx="60" cy="126" r="8" fill="#FFFFFF"/>
    <circle cx="92" cy="98" r="8" fill="#FFFFFF"/>
    <circle cx="124" cy="82" r="8" fill="#FFFFFF"/>
    <circle cx="156" cy="66" r="8" fill="#FFFFFF"/>
    <circle cx="188" cy="50" r="8" fill="#FFFFFF"/>
  </g>
  
  <!-- Growth Trend Line -->
  <path d="M 60 126 L 92 98 L 124 82 L 156 66 L 188 50" 
        stroke="#FFFFFF" 
        stroke-width="5" 
        fill="none" 
        opacity="0.6"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  
  <!-- Baseline Grid -->
  <g opacity="0.15">
    <line x1="40" y1="188" x2="208" y2="188" stroke="#1890FF" stroke-width="2"/>
    <line x1="40" y1="156" x2="208" y2="156" stroke="#1890FF" stroke-width="1.5"/>
    <line x1="40" y1="124" x2="208" y2="124" stroke="#1890FF" stroke-width="1"/>
  </g>

  <!-- Text Section -->
  <g>
    <!-- Chinese Name -->
    <text x="128" y="224" 
          font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" 
          font-size="32" 
          font-weight="700" 
          fill="currentColor"
          text-anchor="middle"
          letter-spacing="2">
      问视间
    </text>

    <!-- English Name -->
    <text x="128" y="248" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="18" 
          font-weight="700" 
          fill="#1890FF"
          text-anchor="middle"
          letter-spacing="4">
      WINS
    </text>
  </g>
</svg>
