<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad48Pro" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B2847;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#597EF7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="url(#grad48Pro)"/>

  <!-- Simplified "Wi" - Solid bars in white -->
  <g opacity="0.95">
    <!-- W - Bar 1 -->
    <rect x="6" y="18" width="4" height="12" rx="1" fill="#FFFFFF"/>
    
    <!-- W - Bar 2 (shorter) -->
    <rect x="12" y="22" width="4" height="8" rx="1" fill="#FFFFFF"/>
    
    <!-- W - Bar 3 -->
    <rect x="18" y="19" width="4" height="11" rx="1" fill="#FFFFFF"/>
    
    <!-- i - Bar 4 (tallest) -->
    <rect x="28" y="12" width="4" height="20" rx="1" fill="#FFFFFF"/>
  </g>
  
  <!-- Red Dot -->
  <circle cx="30" cy="8" r="2.5" fill="#FF4D4F"/>
  
  <!-- Arrow -->
  <path d="M 28 7 L 31.5 3.5 L 35 7" 
        stroke="#FFFFFF" 
        stroke-width="2" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        opacity="0.9"/>
</svg>
