<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad48" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2E5FE8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#722ED1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="url(#grad48)"/>

  <!-- Simplified "Wi" in white -->
  <g opacity="0.95">
    <!-- W: 3 strokes -->
    <path d="M 8 12 L 11 24" 
          stroke="#FFFFFF" 
          stroke-width="3.5" 
          stroke-linecap="round"
          fill="none"/>
    
    <path d="M 11 24 L 15 15 L 19 24" 
          stroke="#FFFFFF" 
          stroke-width="3.5" 
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>
    
    <path d="M 19 24 L 23 12" 
          stroke="#FFFFFF" 
          stroke-width="3.5" 
          stroke-linecap="round"
          fill="none"/>
    
    <!-- i: vertical -->
    <path d="M 31 10 L 31 30" 
          stroke="#FFFFFF" 
          stroke-width="3.5" 
          stroke-linecap="round"
          fill="none"/>
  </g>
  
  <!-- Red dot -->
  <circle cx="31" cy="6" r="2.5" fill="#FF4D4F"/>
  
  <!-- Arrow -->
  <path d="M 29 5 L 32.5 1.5 L 36 5" 
        stroke="#FFFFFF" 
        stroke-width="2" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        opacity="0.9"/>
</svg>
