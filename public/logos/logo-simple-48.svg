<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="simple48" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="url(#simple48)"/>

  <!-- Simplified W Shape (White) - 4 Bars -->
  <g opacity="0.95">
    <!-- Bar 1 -->
    <rect x="9" y="22" width="6" height="18" rx="1.5" fill="#FFFFFF"/>
    
    <!-- Bar 2 (Lowest) -->
    <rect x="17" y="28" width="6" height="12" rx="1.5" fill="#FFFFFF"/>
    
    <!-- Bar 3 -->
    <rect x="25" y="20" width="6" height="20" rx="1.5" fill="#FFFFFF"/>
    
    <!-- Bar 4 (Highest) -->
    <rect x="33" y="14" width="6" height="26" rx="1.5" fill="#FFFFFF"/>
  </g>
  
  <!-- Success Arrow -->
  <path d="M 34 11 L 37.5 7.5 L 41 11" 
        stroke="#FFFFFF" 
        stroke-width="2" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
</svg>
