<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="simple48" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="url(#simple48)"/>

  <!-- Simplified "Wi" (White) -->
  <g opacity="0.95">
    <!-- W: 4 Tilted Bars -->
    <g transform="rotate(-8 8 28)">
      <rect x="6" y="20" width="4" height="14" rx="1.5" fill="#FFFFFF"/>
    </g>
    
    <g transform="rotate(12 12 32)">
      <rect x="11" y="26" width="4" height="10" rx="1.5" fill="#FFFFFF"/>
    </g>
    
    <g transform="rotate(-10 18 26)">
      <rect x="17" y="18" width="4" height="14" rx="1.5" fill="#FFFFFF"/>
    </g>
    
    <g transform="rotate(8 25 22)">
      <rect x="24" y="14" width="4" height="16" rx="1.5" fill="#FFFFFF"/>
    </g>
    
    <!-- i: Straight bar -->
    <rect x="32" y="10" width="4" height="22" rx="1.5" fill="#FFFFFF"/>
  </g>
  
  <!-- Red Dot for "i" -->
  <circle cx="34" cy="7" r="2" fill="#FF4D4F"/>
  
  <!-- Arrow -->
  <path d="M 32 7 L 35.5 3.5 L 39 7" 
        stroke="#FFFFFF" 
        stroke-width="1.8" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
</svg>
