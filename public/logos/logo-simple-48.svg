<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="simple48" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#52C41A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="url(#simple48)"/>

  <!-- Simplified W Shape (White) -->
  <g opacity="0.95">
    <!-- Left Bar -->
    <rect x="8" y="28" width="5" height="12" rx="1.5" fill="#FFFFFF"/>
    
    <!-- Left-Middle Bar -->
    <rect x="15" y="22" width="5" height="18" rx="1.5" fill="#FFFFFF"/>
    
    <!-- Middle Bar -->
    <rect x="22" y="18" width="5" height="22" rx="1.5" fill="#FFFFFF"/>
    
    <!-- Right-Middle Bar -->
    <rect x="29" y="14" width="5" height="26" rx="1.5" fill="#FFFFFF"/>
    
    <!-- Right Bar -->
    <rect x="36" y="10" width="5" height="30" rx="1.5" fill="#FFFFFF"/>
  </g>
  
  <!-- Success Arrow -->
  <path d="M 37 7 L 40 4 L 43 7" 
        stroke="#FFFFFF" 
        stroke-width="2" 
        fill="none" 
        stroke-linecap="round" 
